<!doctype html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Albumania · Friends — redesign options</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&family=Patrick+Hand&display=swap" rel="stylesheet" />
<style>
:root{
  --font-display:"Patrick Hand","Comic Sans MS",system-ui,cursive;
  --primary:#f2a6a0;--select:#4fb8a4;--select-hover:#45a794;--data:#f0c66a;--on-primary:#2e2620;--on-select:#0b352d;--on-data:#3a2c14;
  --paper:#f7e7d3;--surface:#fbf1e2;--surface-muted:#f2e2cc;--border:#2e2620;--border-soft:#cbb493;
  --text:#2e2620;--text-muted:#6f6155;--text-subtle:#9a8b7b;--success-bg:#a9d9c0;--success-text:#1f5540;
  --danger-text:#8a2f2f;--danger-tint:rgba(180,70,70,.12);--link:#c26a4a;--accent:#c26a4a;--paper-dot:rgba(46,38,32,.05);
  --shadow-modal:0 12px 32px rgba(46,38,32,.22);--focus-ring:0 0 0 3px rgba(79,184,164,.4);
  --border-w:3px;--border-w-thin:2px;--radius-sm:7px;--radius:8px;--radius-lg:12px;--radius-pill:999px;
  --shadow-soft:3px 3px 0 var(--border);--shadow-pop:5px 5px 0 var(--border);--shadow-card:5px 5px 0 var(--border);
  --space-1:4px;--space-2:8px;--space-3:12px;--space-4:16px;--space-5:24px;--space-6:32px;--text-xs:.75rem;--text-sm:.85rem;
}
[data-theme="dark"]{
  --paper:#211b16;--surface:#2c251f;--surface-muted:#38302a;--border:#0f0b08;--border-soft:#4a4038;
  --text:#ece0cf;--text-muted:#bcaf9f;--text-subtle:#8a7d6e;--select-hover:#5cc7b3;--success-bg:#6fbf9c;--success-text:#0c3325;
  --danger-text:#e0938c;--danger-tint:rgba(229,145,145,.14);--link:#f0a888;--accent:#f0a888;--paper-dot:rgba(245,236,224,.04);
  --focus-ring:0 0 0 3px rgba(92,199,179,.45);
  --shadow-soft:inset 1.5px 1.5px 0 rgba(255,235,210,.28),3px 3px 0 #000;
  --shadow-pop:inset 2px 2px 0 rgba(255,235,210,.3),5px 5px 0 #000,0 4px 12px rgba(0,0,0,.45);
  --shadow-card:inset 2px 2px 0 rgba(255,230,200,.2),inset -1px -1px 0 rgba(0,0,0,.35),5px 5px 0 #000,0 4px 12px rgba(0,0,0,.4);
}
*{box-sizing:border-box}
body{margin:0;color:var(--text);font-family:"Comic Neue",system-ui,sans-serif;line-height:1.55;
  background-color:var(--paper);background-image:radial-gradient(var(--paper-dot) 1px,transparent 1px);background-size:22px 22px}
h1,h2,h3{font-family:var(--font-display);font-weight:400;color:var(--text);margin:0}

[data-tip]{position:relative}
[data-tip]::before{content:attr(data-tip);position:absolute;top:calc(100% + 7px);left:50%;transform:translateX(-50%);
  background:var(--text);color:var(--surface);font-size:.75rem;font-weight:700;line-height:1.4;white-space:nowrap;padding:.2rem .5rem;
  border-radius:6px;opacity:0;pointer-events:none;transition:opacity .12s;z-index:200}
[data-tip]:hover::before{opacity:1}

.toolbar{position:sticky;top:0;z-index:100;display:flex;flex-wrap:wrap;align-items:center;gap:10px;
  padding:12px clamp(12px,3.5vw,28px);background:var(--surface);border-bottom:var(--border-w) solid var(--border)}
.toolbar .brand{font-family:var(--font-display);font-size:1.35rem;margin-right:6px}
.toolbar .spacer{flex:1}
.chip{font-family:inherit;font-weight:700;font-size:.9rem;cursor:pointer;padding:7px 14px;border-radius:var(--radius-pill);
  border:var(--border-w-thin) solid var(--border);background:var(--surface);color:var(--text);box-shadow:var(--shadow-soft);
  transition:transform .1s,box-shadow .1s,background .12s}
.chip:hover{transform:translate(-1px,-1px);box-shadow:var(--shadow-pop)}
.chip[aria-selected="true"]{background:var(--select);color:var(--on-select)}

.wrap{max-width:min(93vw,1560px);margin:1.6rem auto;padding:0 .35rem}
.intro{padding:0 .3rem;margin-bottom:var(--space-4)}
.intro h1{font-size:1.7rem;margin-bottom:2px}
.intro p{color:var(--text-muted);margin:.2rem 0;font-size:.95rem}
.pageTitle{font-size:clamp(1.9rem,3vw,2.4rem)}
.pageSub{color:var(--text-muted);font-weight:700;margin:2px 0 var(--space-4)}
.option{display:none}.option.active{display:block}

/* avatars */
.av{border-radius:50%;border:var(--border-w-thin) solid var(--border);flex-shrink:0;display:grid;place-items:center;
  font-weight:800;color:#3a2c14;background:linear-gradient(135deg,#f2a6a0,#f0c66a);overflow:hidden}
.av.h1{background:linear-gradient(135deg,#a9cfe0,#a9d9c0)}.av.h2{background:linear-gradient(135deg,#c9b6e0,#a9cfe0)}
.av.h3{background:linear-gradient(135deg,#f0c66a,#eaa0a0)}.av.h4{background:linear-gradient(135deg,#a9d9c0,#f0c66a)}

/* searchbar (album-style) */
.searchWrap{position:relative;max-width:520px}
.searchBar{display:flex;align-items:center;gap:.6rem;padding:.55rem .85rem;border-radius:var(--radius-pill);
  background:var(--surface);border:var(--border-w-thin) solid var(--border);cursor:text}
[data-theme="dark"] .searchBar{border-color:var(--border-soft)}
.searchBar:focus-within{background:var(--surface-muted)}
.searchBar input{flex:1;min-width:0;border:none;background:transparent;outline:none;font:inherit;font-size:.95rem;color:var(--text)}
.searchBar input::placeholder{color:var(--text-subtle)}
.searchIcon{color:var(--text-subtle);flex-shrink:0}
.searchPanel{position:absolute;z-index:30;left:0;right:0;top:calc(100% + 6px);background:var(--surface);
  border:var(--border-w-thin) solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow-modal);padding:.3rem;max-height:20rem;overflow-y:auto}
[data-theme="dark"] .searchPanel{border-color:var(--border-soft)}
.resultRow{display:flex;align-items:center;gap:.6rem;padding:.45rem .5rem;border-radius:var(--radius-sm)}
.resultRow:hover{background:var(--surface-muted)}
.userText{display:flex;flex-direction:column;min-width:0;flex:1}
.userName{font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.userHandle{color:var(--text-subtle);font-size:.8rem}
.privatePill{display:inline-flex;align-items:center;gap:3px;font-size:.68rem;font-weight:800;padding:.05rem .45rem;border-radius:var(--radius-pill);
  background:color-mix(in srgb,var(--data) 24%,var(--surface));border:var(--border-w-thin) solid color-mix(in srgb,var(--data) 55%,var(--border-soft));color:var(--on-data)}
.resultStatus{font-size:.8rem;font-weight:700;color:var(--text-subtle)}

/* tabs (pill segmented) */
.tabs{display:inline-flex;gap:3px;padding:3px;background:var(--surface-muted);border:var(--border-w-thin) solid var(--border-soft);border-radius:var(--radius-pill)}
.tab{border:none;background:transparent;color:var(--text-muted);font:inherit;font-weight:700;font-size:.9rem;padding:7px 16px;border-radius:var(--radius-pill);cursor:pointer;display:inline-flex;align-items:center;gap:6px}
.tab:hover:not(.tabActive){color:var(--text)}
.tabActive{background:var(--select);color:var(--on-select)}
.tabCount{font-size:.72rem;font-weight:800;padding:0 6px;border-radius:var(--radius-pill);background:color-mix(in srgb,var(--border) 12%,transparent)}
.tabActive .tabCount{background:rgba(255,255,255,.28)}

/* icon buttons */
.iconBtn{position:relative;display:inline-flex;align-items:center;justify-content:center;width:38px;height:38px;flex-shrink:0;
  border-radius:var(--radius-pill);border:var(--border-w-thin) solid var(--border);box-shadow:var(--shadow-soft);cursor:pointer;background:var(--surface);
  transition:transform .12s,box-shadow .12s,background .12s,color .12s}
.iconBtn svg{width:19px;height:19px}
.iconBtn:hover{transform:translate(-1px,-1px);box-shadow:var(--shadow-pop)}
.iconAdd,.iconAccept{background:#d3ebe1;color:#2f8f77}.iconAdd:hover,.iconAccept:hover{background:#2f8f77;color:#fbf1e2}
.iconRemove,.iconDecline{background:#f4d8d3;color:#c2554e}.iconRemove:hover,.iconDecline:hover{background:#c2554e;color:#fbf1e2}
[data-theme="dark"] .iconAdd,[data-theme="dark"] .iconAccept{background:#233d36;color:#57c3a7}
[data-theme="dark"] .iconAdd:hover,[data-theme="dark"] .iconAccept:hover{background:#3aa088;color:#08231c}
[data-theme="dark"] .iconRemove,[data-theme="dark"] .iconDecline{background:#4a2f2c;color:#e0938c}
[data-theme="dark"] .iconRemove:hover,[data-theme="dark"] .iconDecline:hover{background:#d06a63;color:#211b16}
.btnText{font-family:inherit;font-weight:800;font-size:.85rem;cursor:pointer;padding:.4rem .9rem;border-radius:var(--radius);
  border:var(--border-w) solid var(--border);box-shadow:var(--shadow-soft);background:var(--primary);color:var(--on-primary)}
.btnText:hover{transform:translate(-1px,-1px);box-shadow:var(--shadow-pop)}

/* ---- friend row (list form) ---- */
.listCard{background:var(--surface);border:var(--border-w) solid var(--border);border-radius:var(--radius-lg);box-shadow:var(--shadow-card);padding:var(--space-2) var(--space-3)}
[data-theme="dark"] .listCard,[data-theme="dark"] .tbox,[data-theme="dark"] .fcard{box-shadow:inset 0 0 0 1.5px rgba(255,233,208,.16),5px 5px 0 #000,0 6px 16px rgba(0,0,0,.45)}
.frow{display:flex;align-items:center;gap:var(--space-3);padding:.6rem .55rem;border-radius:var(--radius);transition:background .12s}
.frow:hover{background:var(--surface-muted)}
.frow + .frow{border-top:var(--border-w-thin) solid color-mix(in srgb,var(--border-soft) 55%,transparent)}
.frowName{flex:1;min-width:0;font-weight:700;color:var(--text);text-decoration:none;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.frow:hover .frowName{color:var(--accent)}
.frowHandle{color:var(--text-subtle);font-size:.8rem;font-weight:400}
.frowActions{display:inline-flex;gap:8px;flex-shrink:0}

/* ---- friend card (gallery) ---- */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:var(--space-4)}
.fcard{background:var(--surface);border:var(--border-w) solid var(--border);border-radius:var(--radius-lg);box-shadow:var(--shadow-card);
  padding:var(--space-4);display:flex;flex-direction:column;align-items:center;text-align:center;gap:var(--space-2)}
.fcard .fname{font-weight:700;color:var(--text);text-decoration:none;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:100%}
.fcard .fname:hover{color:var(--accent)}
.fcard .fhandle{color:var(--text-subtle);font-size:.8rem}
.fcardActions{display:inline-flex;gap:8px;margin-top:var(--space-1)}

/* ---- requests rail (trending-box style) ---- */
.split{display:grid;grid-template-columns:330px 1fr;gap:var(--space-5);align-items:start}
@media(max-width:900px){.split{grid-template-columns:1fr}}
.rail{display:flex;flex-direction:column;gap:var(--space-5);position:sticky;top:88px}
.tbox{background:var(--surface);border:var(--border-w) solid var(--border);border-radius:var(--radius-lg);box-shadow:var(--shadow-card);padding:var(--space-4) var(--space-4) var(--space-3)}
.tboxHead{display:flex;align-items:center;justify-content:space-between;gap:var(--space-3);margin-bottom:var(--space-3);padding-bottom:var(--space-2);border-bottom:var(--border-w-thin) solid var(--border)}
.tboxTitle{font-family:var(--font-display);font-size:1.25rem}
.tboxCount{font-size:.72rem;font-weight:800;color:var(--on-select);background:var(--select);border:var(--border-w-thin) solid var(--border);border-radius:var(--radius-pill);padding:.05rem .5rem}
.tRow{display:grid;grid-template-columns:auto 1fr auto;align-items:center;gap:.6rem;padding:.5rem .3rem;border-bottom:var(--border-w-thin) solid var(--border-soft)}
.tRow:last-child{border-bottom:none}
.tRow .nm{min-width:0;display:flex;flex-direction:column}
.tRow .nm b{font-size:.9rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tRow .nm span{font-size:.76rem;color:var(--text-subtle)}
.tActs{display:inline-flex;gap:6px}
.iconBtn.sm{width:32px;height:32px}.iconBtn.sm svg{width:16px;height:16px}
.emptyLine{color:var(--text-muted);font-style:italic;font-size:.88rem;margin:.3rem 0}
.sectionH{font-family:var(--font-display);font-size:1.5rem;margin:0 0 var(--space-3)}
.stackRow{display:flex;align-items:center;justify-content:space-between;gap:var(--space-3);flex-wrap:wrap;margin-bottom:var(--space-3)}
</style>
</head>
<body>

<div class="toolbar">
  <span class="brand">Albumania</span>
  <button class="chip" aria-selected="true" data-opt="A">A · Tabs + list</button>
  <button class="chip" aria-selected="false" data-opt="B">B · Requests rail + grid</button>
  <button class="chip" aria-selected="false" data-opt="C">C · Tabs + card gallery</button>
  <span class="spacer"></span>
  <button class="chip" id="themeToggle">🌙 Dark</button>
</div>

<svg style="display:none">
  <symbol id="ic-search" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="M20 20l-3.5-3.5"/></symbol>
  <symbol id="ic-check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12.5l4.5 4.5L19 7"/></symbol>
  <symbol id="ic-close" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"><path d="M6 6l12 12M18 6 6 18"/></symbol>
  <symbol id="ic-trash" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7h16"/><path d="M9 7V5c0-.6.4-1 1-1h4c.6 0 1 .4 1 1v2"/><path d="M6 7l1 12c0 .6.4 1 1 1h8c.6 0 1-.4 1-1l1-12"/><path d="M10 11v6M14 11v6"/></symbol>
  <symbol id="ic-userplus" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="8" r="3.4"/><path d="M3.5 20c0-3.3 2.5-5.5 5.5-5.5s5.5 2.2 5.5 5.5"/><path d="M18 8.5v5M15.5 11h5"/></symbol>
  <symbol id="ic-lock" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="11" width="14" height="9" rx="2"/><path d="M8 11V8a4 4 0 0 1 8 0v3"/></symbol>
</svg>

<div class="wrap">
  <div class="intro">
    <h1>Friends — redesign options</h1>
    <p>Same width/palette/components as the rest of the app: album-style search dropdown, the pill segmented control,
    icon action buttons (with the shared hover fills), sticker cards, avatars. Switch options above; toggle dark.</p>
  </div>
  <div id="mount"></div>
</div>

<script>
const FRIENDS = [["Ada","h1"],["Noah","h2"],["Mia","h3"],["Leo","h4"],["Ivy","h1"],["Sam","h2"],["Jo","h3"],["Ash","h4"]];
const INCOMING = [["Ren","h2"],["Kai","h3"]];
const OUTGOING = [["Uma","h4"]];
const RESULTS = [["Nova","nova","",""],["Ada","ada","friends",""],["Uma","uma","requested",""],["Ren","ren","incoming","lock"]];

const av=(name,h,size=44)=>`<span class="av ${h}" style="width:${size}px;height:${size}px;font-size:${Math.round(size*0.4)}px">${name[0]}</span>`;
const searchBar = `<div class="searchWrap"><div class="searchBar"><svg class="searchIcon" width="18" height="18"><use href="#ic-search"/></svg>
  <input placeholder="Search people by username or display name…" value="a"/></div>
  <div class="searchPanel">${RESULTS.map(r=>{
    const action = r[2]==="friends"?`<span class="resultStatus">Friends</span>`
      : r[2]==="requested"?`<span class="resultStatus">Requested</span>`
      : r[2]==="incoming"?`<span class="tActs"><button class="iconBtn sm iconAccept" data-tip="Accept"><svg><use href="#ic-check"/></svg></button><button class="iconBtn sm iconDecline" data-tip="Decline"><svg><use href="#ic-close"/></svg></button></span>`
      : `<button class="iconBtn iconAdd" data-tip="Add friend"><svg><use href="#ic-userplus"/></svg></button>`;
    return `<div class="resultRow">${av(r[0],'h'+((r[1].length%4)+1),36)}
      <span class="userText"><span class="userName">${r[0]}</span><span class="userHandle">@${r[1]}</span></span>
      ${r[3]==="lock"?`<span class="privatePill"><svg width="11" height="11"><use href="#ic-lock"/></svg>Friends</span>`:""}
      ${action}</div>`;
  }).join("")}</div></div>`;

function tabs(active){
  const t=[["Friends",FRIENDS.length],["Incoming",INCOMING.length],["Outgoing",OUTGOING.length]];
  return `<div class="tabs">${t.map(x=>`<button class="tab ${x[0]===active?'tabActive':''}">${x[0]} <span class="tabCount">${x[1]}</span></button>`).join("")}</div>`;
}
const friendRow = f=>`<div class="frow">${av(f[0],f[1])}
  <a class="frowName" href="#">${f[0]} <span class="frowHandle">@${f[0].toLowerCase()}</span></a>
  <div class="frowActions"><button class="iconBtn iconRemove" data-tip="Unfriend"><svg><use href="#ic-trash"/></svg></button></div></div>`;
const friendCard = f=>`<article class="fcard">${av(f[0],f[1],72)}
  <a class="fname" href="#">${f[0]}</a><span class="fhandle">@${f[0].toLowerCase()}</span>
  <div class="fcardActions"><button class="iconBtn iconRemove" data-tip="Unfriend"><svg><use href="#ic-trash"/></svg></button></div></article>`;
const reqRow=(f,variant)=>`<div class="tRow">${av(f[0],f[1],38)}
  <span class="nm"><b>${f[0]}</b><span>@${f[0].toLowerCase()}</span></span>
  <span class="tActs">${variant==="in"
    ? `<button class="iconBtn sm iconAccept" data-tip="Accept"><svg><use href="#ic-check"/></svg></button><button class="iconBtn sm iconDecline" data-tip="Decline"><svg><use href="#ic-close"/></svg></button>`
    : `<button class="iconBtn sm iconDecline" data-tip="Cancel"><svg><use href="#ic-close"/></svg></button>`}</span></div>`;

const LAYOUTS={
  A:()=>`<h1 class="pageTitle">Friends</h1><p class="pageSub">You have ${FRIENDS.length} friends.</p>
    ${searchBar}
    <div style="margin:var(--space-5) 0 var(--space-4)">${tabs("Friends")}</div>
    <div class="listCard">${FRIENDS.map(friendRow).join("")}</div>`,

  B:()=>`<h1 class="pageTitle">Friends</h1><p class="pageSub">You have ${FRIENDS.length} friends.</p>
    <div class="split">
      <aside class="rail">
        <section class="tbox"><div class="tboxHead"><span class="tboxTitle">Incoming</span><span class="tboxCount">${INCOMING.length}</span></div>
          ${INCOMING.length?INCOMING.map(f=>reqRow(f,"in")).join(""):`<p class="emptyLine">No incoming requests.</p>`}</section>
        <section class="tbox"><div class="tboxHead"><span class="tboxTitle">Outgoing</span><span class="tboxCount">${OUTGOING.length}</span></div>
          ${OUTGOING.length?OUTGOING.map(f=>reqRow(f,"out")).join(""):`<p class="emptyLine">Nothing pending.</p>`}</section>
      </aside>
      <div>
        ${searchBar}
        <h2 class="sectionH" style="margin-top:var(--space-5)">Your friends</h2>
        <div class="grid">${FRIENDS.map(friendCard).join("")}</div>
      </div>
    </div>`,

  C:()=>`<h1 class="pageTitle">Friends</h1><p class="pageSub">You have ${FRIENDS.length} friends.</p>
    <div class="stackRow">${searchBar}${tabs("Friends")}</div>
    <div class="grid">${FRIENDS.map(friendCard).join("")}</div>`
};

let cur="A";
function render(){document.getElementById('mount').innerHTML=LAYOUTS[cur]();}
render();
document.querySelectorAll('.chip[data-opt]').forEach(c=>c.addEventListener('click',()=>{
  document.querySelectorAll('.chip[data-opt]').forEach(x=>x.setAttribute('aria-selected','false'));
  c.setAttribute('aria-selected','true');cur=c.dataset.opt;render();window.scrollTo({top:0});
}));
const tt=document.getElementById('themeToggle');
tt.addEventListener('click',()=>{const d=document.documentElement.getAttribute('data-theme')==='dark';
  document.documentElement.setAttribute('data-theme',d?'light':'dark');tt.textContent=d?'🌙 Dark':'☀️ Light';});
</script>
</body>
</html>
