services:
  - type: web
    name: albumania-api
    runtime: python
    rootDir: backend
    buildCommand: pip install uv && uv sync --no-dev
    startCommand: uv run uvicorn app.main:app --host 0.0.0.0 --port $PORT
    preDeployCommand: uv run alembic upgrade head
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: SPOTIFY_CLIENT_ID
        sync: false
      - key: SPOTIFY_CLIENT_SECRET
        sync: false
      - key: CORS_ORIGINS
        sync: false
      # Transactional email (Resend). RESEND_API_KEY is a secret → set in dashboard.
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        value: Albumania <noreply@albumania.net>
      - key: FRONTEND_BASE_URL
        sync: false
      - key: STORAGE_BACKEND
        value: r2
      - key: API_BASE_URL
        sync: false
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET
        sync: false
      - key: R2_PUBLIC_URL_BASE
        sync: false
