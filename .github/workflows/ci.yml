name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: uv sync
      - name: Run tests
        run: uv run pytest
        env:
          DATABASE_URL: "sqlite:///./test.db"
          JWT_SECRET: "ci-test-secret-do-not-use"
          SPOTIFY_CLIENT_ID: ""
          SPOTIFY_CLIENT_SECRET: ""

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm install
      - name: Type check
        run: pnpm tsc --noEmit
      - name: Test
        run: pnpm test
      - name: Build
        run: pnpm build
        env:
          VITE_API_BASE_URL: "https://placeholder.onrender.com"
